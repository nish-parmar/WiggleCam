name: Wigglegram
options:
  bundleIdPrefix: app.wigglegram
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO
targets:
  Wigglegram:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Wigglegram
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Wigglegram/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.wigglegram.Wigglegram
        INFOPLIST_FILE: Wigglegram/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    scheme:
      testTargets: []
      gatherCoverageData: false
schemes:
  Wigglegram:
    build:
      targets:
        Wigglegram: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
